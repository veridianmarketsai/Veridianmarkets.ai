
<style>
*{box-sizing:border-box;margin:0;padding:0}
.outer{position:relative;width:100%;padding:16px 0 8px}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:12px;min-height:24px;flex-wrap:wrap}
.crumb{font-size:12px;color:var(--color-text-secondary);cursor:pointer;padding:2px 8px;border-radius:4px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);transition:background .15s}
.crumb:hover{background:var(--color-background-secondary)}
.crumb.active{color:var(--color-text-primary);font-weight:500;cursor:default;background:var(--color-background-secondary)}
.crumb-sep{font-size:11px;color:var(--color-text-tertiary)}
.canvas{position:relative;width:100%;height:500px}
svg.lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.col{position:absolute;top:0;display:flex;flex-direction:column;justify-content:center;gap:8px;height:100%}
.col-left{left:0;width:195px}
.col-right{right:0;width:195px}
.col-center{left:50%;transform:translateX(-50%);width:170px;display:flex;align-items:center;justify-content:center;height:100%}
.glabel{font-size:9px;color:var(--color-text-secondary);letter-spacing:.5px;text-transform:uppercase;padding:0 10px 1px}

.node{position:relative;padding:7px 11px;border-radius:6px;cursor:default;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);transition:transform .2s cubic-bezier(.34,1.56,.64,1),border-color .15s,padding .15s;z-index:2;overflow:hidden}
.col-left .node:hover{transform:translateX(4px);border-color:var(--color-border-secondary)}
.col-right .node:hover{transform:translateX(-4px);border-color:var(--color-border-secondary)}
.node.grp-a{border-left:3px solid #185FA5;border-radius:0}
.node.grp-b{border-left:3px solid #D85A30;border-radius:0}
.node.grp-c{border-right:3px solid #0F6E56;border-radius:0}

.node-header{display:flex;align-items:center;justify-content:space-between;gap:6px}
.node-header-right{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s}
.node:hover .node-header-right{opacity:1}

.node .tk{font-size:12px;font-weight:500;color:var(--color-text-primary);flex:1;min-width:0}
.node .sb{font-size:10px;color:var(--color-text-secondary);margin-top:1px}

.act-btn{width:24px;height:24px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;color:var(--color-text-secondary);flex-shrink:0}
.act-btn:hover{background:var(--color-background-tertiary);transform:scale(1.1);color:var(--color-text-primary)}
.act-btn.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.act-btn i{font-size:12px}

.node-detail{max-height:0;overflow:hidden;transition:max-height .2s ease,margin-top .2s ease;margin-top:0}
.node:hover .node-detail{max-height:80px;margin-top:6px}
.detail-row{display:flex;justify-content:space-between;gap:8px;padding:1px 0}
.detail-divider{border-top:0.5px solid var(--color-border-tertiary);margin-bottom:4px}
.dl{font-size:10px;color:var(--color-text-secondary)}
.dv{font-size:10px;font-weight:500;color:var(--color-text-primary);text-align:right}

.principle{width:150px;height:150px;border-radius:12px;background:#1D4E3A;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;z-index:2;position:relative}
.p-meta{font-size:8px;color:#9FE1CB;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.p-name{font-size:18px;font-weight:500;color:#E1F5EE;line-height:1.2}
.p-sub{font-size:9px;color:#5DCAA5;margin-top:3px}

.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;padding:0 2px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.node{animation:fadeIn .22s ease both}
.principle{animation:fadeIn .28s ease both}
</style>

<div class="outer">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="canvas" id="canvas">
    <svg class="lines" id="lines"></svg>
    <div class="col col-left" id="left-col"></div>
    <div class="col col-center" id="center-col"></div>
    <div class="col col-right" id="right-col"></div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="border-left:3px solid #185FA5;background:var(--color-background-primary)"></div>Company (direct)</div>
    <div class="leg-item"><div class="leg-dot" style="border-left:3px solid #D85A30;background:var(--color-background-primary)"></div>External factor</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D4E3A;border-radius:3px"></div>The principle</div>
    <div class="leg-item"><div class="leg-dot" style="border-right:3px solid #0F6E56;background:var(--color-background-primary)"></div>Customer/channel</div>
  </div>
</div>

<script>

  ],customers:[

    {id:'FEDEX',name:'FedEx',ticker:'FDX',cat:'a',role:'Freight & express',note:'Supplement logistics',risk:'Margin pressure'},

  ]}
};

function resolveKey(id, ticker) {
  if (DB[id]) return id;
  if (DB[ticker]) return ticker;
  return null;
}

let history = ['AAPL'];

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  history.forEach((id, i) => {
    const data = DB[id] || {ticker: id};
    const span = document.createElement('span');
    span.className = 'crumb' + (i === history.length-1 ? ' active' : '');
    span.textContent = data.ticker || id;
    if (i < history.length-1) {
      span.onclick = () => { history = history.slice(0, i+1); render(id); };
    }
    bc.appendChild(span);
    if (i < history.length-1) {
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    }
  });
}

function makePrinciple(e, id, ticker) {
  e.stopPropagation();
  const key = resolveKey(id, ticker);
  if (!key) return;
  if (history[history.length-1] === key) return;
  history.push(key);
  render(key);
}

function nodeHTML(n, side) {
  const grp = side === 'right' ? 'grp-c' : (n.cat === 'b' ? 'grp-b' : 'grp-a');
  const alignRight = side === 'right';
  const canDrill = !!resolveKey(n.id, n.ticker);

  const openBtn = `<div class="act-btn disabled" title="Open (coming soon)"><i class="ti ti-external-link"></i></div>`;
  const drillBtn = canDrill
    ? `<div class="act-btn" title="Make principle" onclick="makePrinciple(event,'${n.id}','${n.ticker}')"><i class="ti ti-arrow-right"></i></div>`
    : `<div class="act-btn disabled" title="No data"><i class="ti ti-arrow-right"></i></div>`;

  const roleShort = n.role.split(' ').slice(0,2).join(' ').toLowerCase();

  return `<div class="node ${grp}" data-id="${n.id}" data-ticker="${n.ticker}">
    <div class="node-header">
      ${alignRight ? `<div class="node-header-right">${drillBtn}${openBtn}</div>` : ''}
      <div style="flex:1;min-width:0;${alignRight ? 'text-align:right' : ''}">
        <div class="tk">${n.ticker} <span style="font-size:9px;color:var(--color-text-secondary)">· ${roleShort}</span></div>
        <div class="sb">${n.name}</div>
      </div>
      ${!alignRight ? `<div class="node-header-right">${openBtn}${drillBtn}</div>` : ''}
    </div>
    <div class="node-detail">
      <div class="detail-divider"></div>
      ${n.note ? `<div class="detail-row"><span class="dl">Detail</span><span class="dv">${n.note}</span></div>` : ''}
      ${n.risk ? `<div class="detail-row"><span class="dl">Risk</span><span class="dv">${n.risk}</span></div>` : ''}
    </div>
  </div>`;
}

function render(id) {
  const data = DB[id];
  if (!data) return;
  const leftCol = document.getElementById('left-col');
  const rightCol = document.getElementById('right-col');
  const centerCol = document.getElementById('center-col');

  leftCol.innerHTML = '<div class="glabel">inputs · dependencies</div>';
  const compInputs = data.inputs.filter(n => n.cat === 'a');
  const extInputs = data.inputs.filter(n => n.cat === 'b');
  if (compInputs.length) {
    leftCol.innerHTML += '<div class="glabel" style="font-size:8px;opacity:.7">companies</div>';
    compInputs.forEach(n => leftCol.innerHTML += nodeHTML(n, 'left'));
  }
  if (extInputs.length) {
    leftCol.innerHTML += '<div class="glabel" style="font-size:8px;opacity:.7;margin-top:4px">external</div>';
    extInputs.forEach(n => leftCol.innerHTML += nodeHTML(n, 'left'));
  }

  centerCol.innerHTML = `<div class="principle">
    <div class="p-meta">${data.meta}</div>
    <div class="p-name">${data.name}</div>
    <div class="p-sub">${data.ticker} · the principle</div>
  </div>`;

  rightCol.innerHTML = '<div class="glabel" style="text-align:right">customers</div>';
  data.customers.forEach(n => rightCol.innerHTML += nodeHTML(n, 'right'));

  renderBreadcrumb();
  setTimeout(drawLines, 50);

  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('mouseenter', () => { highlightLines(node.dataset.id, true); setTimeout(drawLines, 220); });
    node.addEventListener('mouseleave', () => { highlightLines(node.dataset.id, false); setTimeout(drawLines, 220); });
  });
}

function getCenter(el) {
  const cr = document.getElementById('canvas').getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left - cr.left + er.width/2, y: er.top - cr.top + er.height/2 };
}

function drawLines() {
  const svg = document.getElementById('lines');
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  function mkMarker(mid, color) {
    const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id',mid); m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6');
    m.setAttribute('refX','5'); m.setAttribute('refY','3'); m.setAttribute('orient','auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M0,0 L0,6 L6,3 z'); p.setAttribute('fill',color);
    m.appendChild(p); defs.appendChild(m);
  }
  mkMarker('arr-blue','#378ADD'); mkMarker('arr-coral','#D85A30'); mkMarker('arr-teal','#1D9E75');
  svg.appendChild(defs);
  const principle = document.querySelector('.principle');
  if (!principle) return;
  const pc = getCenter(principle);
  document.querySelectorAll('.col-left .node').forEach(node => {
    const nc = getCenter(node);
    const isB = node.classList.contains('grp-b');
    const color = isB ? '#D85A30' : '#378ADD';
    const mid = (nc.x + pc.x) / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d',`M${nc.x},${nc.y} C${mid},${nc.y} ${mid},${pc.y} ${pc.x-73},${pc.y}`);
    line.setAttribute('stroke',color); line.setAttribute('stroke-width','1');
    line.setAttribute('fill','none'); line.setAttribute('opacity','0.3');
    line.setAttribute('marker-end', isB ? 'url(#arr-coral)' : 'url(#arr-blue)');
    line.dataset.node = node.dataset.id;
    svg.appendChild(line);
  });
  document.querySelectorAll('.col-right .node').forEach(node => {
    const nc = getCenter(node);
    const mid = (nc.x + pc.x) / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d',`M${pc.x+73},${pc.y} C${mid},${pc.y} ${mid},${nc.y} ${nc.x},${nc.y}`);
    line.setAttribute('stroke','#1D9E75'); line.setAttribute('stroke-width','1');
    line.setAttribute('fill','none'); line.setAttribute('opacity','0.3');
    line.setAttribute('marker-end','url(#arr-teal)');
    line.dataset.node = node.dataset.id;
    svg.appendChild(line);
  });
}

function highlightLines(id, active) {
  document.querySelectorAll('path[data-node]').forEach(l => {
    if (l.dataset.node === id) {
      l.setAttribute('stroke-width', active ? '2.5' : '1');
      l.setAttribute('opacity', active ? '0.85' : '0.3');
    }
  });
}

render('AAPL');
window.addEventListener('resize', drawLines);
</script>
