<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:26px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.sw{height:54px;border-radius:8px;border:1px solid var(--vm-border-soft);display:flex;align-items:flex-end;padding:6px}
.sw .vm-label{font-size:8.5px}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase;margin-top:5px}
.hex{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3)}
.card{background:var(--vm-paper);border:1px solid var(--vm-border-soft);border-radius:12px}

</style></head><body><span class="vm-kicker vm-kicker--muted">Supply-chain node colors</span><div style="height:14px"></div>
<div class="row" style="gap:10px;align-items:stretch">
  <div style="padding:9px 12px;background:#FBF9F3;border:1px solid var(--vm-border);border-left:3px solid #185FA5;border-radius:0 6px 6px 0"><div class="vm-data" style="font-weight:700">TSM</div><div class="cap" style="margin:0">supplier · input</div></div>
  <div style="padding:9px 12px;background:#E6F1FB;border:1px solid #B5D4F4;border-radius:6px"><div class="vm-data" style="font-weight:700;color:#0C447C">TMUS</div><div class="cap" style="margin:0;color:#0C447C">customer</div></div>
  <div style="padding:9px 12px;background:transparent;border:1.4px dashed #C46A3B;border-radius:6px"><div class="vm-data" style="font-weight:700;color:#A8512A">XOM</div><div class="cap" style="margin:0;color:#A8512A">external factor</div></div>
  <div style="padding:9px 14px;background:#1D4E3A;border-radius:8px;display:flex;flex-direction:column;justify-content:center"><div class="vm-data" style="font-weight:700;color:#E1F1EC">AAPL</div><div class="cap" style="margin:0;color:#5DCAA5">the principle</div></div>
</div></body></html>
