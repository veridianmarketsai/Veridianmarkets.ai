<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:26px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.sw{height:54px;border-radius:8px;border:1px solid var(--vm-border-soft);display:flex;align-items:flex-end;padding:6px}
.sw .vm-label{font-size:8.5px}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase;margin-top:5px}
.hex{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3)}
.card{background:var(--vm-paper);border:1px solid var(--vm-border-soft);border-radius:12px}

</style></head><body><span class="vm-kicker vm-kicker--muted">Elevation · low & papery</span><div style="height:18px"></div>
<div class="row" style="gap:22px">
  <div class="col" style="align-items:center;gap:9px"><div style="width:120px;height:58px;background:var(--vm-paper);border:1px solid var(--vm-border-soft);border-radius:8px;box-shadow:var(--vm-shadow-flat)"></div><span class="hex">flat · printed</span></div>
  <div class="col" style="align-items:center;gap:9px"><div style="width:120px;height:58px;background:var(--vm-paper);border-radius:12px;box-shadow:var(--vm-shadow-card)"></div><span class="hex">card</span></div>
  <div class="col" style="align-items:center;gap:9px"><div style="width:120px;height:58px;background:var(--vm-paper);border-radius:12px;box-shadow:var(--vm-shadow-pop)"></div><span class="hex">popover</span></div>
</div></body></html>
