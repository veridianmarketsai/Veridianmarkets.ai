<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:26px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.sw{height:54px;border-radius:8px;border:1px solid var(--vm-border-soft);display:flex;align-items:flex-end;padding:6px}
.sw .vm-label{font-size:8.5px}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase;margin-top:5px}
.hex{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3)}
.card{background:var(--vm-paper);border:1px solid var(--vm-border-soft);border-radius:12px}

</style></head><body><span class="vm-kicker vm-kicker--muted">Spacing · 4px base</span><div style="height:14px"></div>
<div class="col" style="gap:9px"><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-1</span><div style="height:14px;width:4px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">4px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-2</span><div style="height:14px;width:8px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">8px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-3</span><div style="height:14px;width:12px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">12px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-4</span><div style="height:14px;width:16px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">16px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-5</span><div style="height:14px;width:24px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">24px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-6</span><div style="height:14px;width:32px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">32px</span></div><div class="row" style="gap:12px"><span class="hex" style="width:54px">space-7</span><div style="height:14px;width:48px;background:var(--vm-teal);border-radius:2px"></div><span class="hex">48px</span></div></div></body></html>
