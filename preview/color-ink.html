<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:26px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.sw{height:54px;border-radius:8px;border:1px solid var(--vm-border-soft);display:flex;align-items:flex-end;padding:6px}
.sw .vm-label{font-size:8.5px}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase;margin-top:5px}
.hex{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3)}
.card{background:var(--vm-paper);border:1px solid var(--vm-border-soft);border-radius:12px}

</style></head><body><span class="vm-kicker vm-kicker--muted">Ink · warm near-black</span><div style="height:14px"></div><div class="row" style="gap:12px"><div class="col" style="width:120px"><div class="sw" style="background:#1F1D1A;color:#F4F1E8"><span class="vm-label" style="color:rgba(244,241,232,.7)">ink</span></div><span class="hex"> #1F1D1A</span></div><div class="col" style="width:120px"><div class="sw" style="background:#4A4640;color:#F4F1E8"><span class="vm-label" style="color:rgba(244,241,232,.7)">ink-2</span></div><span class="hex">#4A4640</span></div><div class="col" style="width:120px"><div class="sw" style="background:#8A857D;color:#F4F1E8"><span class="vm-label" style="color:rgba(244,241,232,.7)">ink-3</span></div><span class="hex">#8A857D</span></div><div class="col" style="width:120px"><div class="sw" style="background:#B6AFA2;"><span class="vm-label" style="">faint</span></div><span class="hex">#B6AFA2</span></div></div></body></html>
