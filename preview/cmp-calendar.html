<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase}
/* buttons */
.btn{font-family:var(--vm-serif);font-size:14px;border-radius:999px;padding:8px 18px;cursor:pointer;border:1px solid var(--vm-border);background:var(--vm-paper);color:var(--vm-ink)}
.btn--solid{background:var(--vm-teal-deep);color:#F4F1E8;border-color:var(--vm-teal-deep)}
.iconbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--vm-border);background:var(--vm-paper);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2);cursor:pointer}
.iconbtn.active{background:var(--vm-teal-deep);border-color:var(--vm-teal-deep);color:#F4F1E8}
.iconbtn--round{border-radius:999px}
.pill{font-family:var(--vm-mono);font-size:11px;padding:6px 13px;border:1px solid var(--vm-border);border-radius:999px;background:var(--vm-paper);color:var(--vm-ink-2);display:flex;align-items:center;gap:6px}
.pill b{color:var(--vm-ink);font-weight:700}
.pill--dash{border-style:dashed;color:var(--vm-ink-3)}
.search{display:flex;align-items:center;gap:9px;border:1px solid var(--vm-border);border-radius:999px;padding:9px 15px;background:var(--vm-paper);min-width:280px}
.search input{border:0;background:transparent;outline:0;font-family:var(--vm-serif);font-size:14px;color:var(--vm-ink);flex:1}
.kbd{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3);border:1px solid var(--vm-border-soft);border-radius:4px;padding:2px 6px;background:var(--vm-paper-warm)}
.badge{font-family:var(--vm-mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}

</style></head><body><span class="cap">Mini calendar</span><div style="height:10px"></div>
<div class="card" style="padding:14px;max-width:280px;border:1.5px solid var(--vm-ink)">
<div class="row" style="justify-content:space-between;margin-bottom:10px"><span style="font-family:var(--vm-serif);font-weight:600;font-size:15px">May 2026</span><span class="cap" style="margin:0">‹ ›</span></div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-family:var(--vm-mono);font-size:10px;text-align:center"><div style="color:var(--vm-ink-3);padding-bottom:3px">Su</div><div style="color:var(--vm-ink-3);padding-bottom:3px">Mo</div><div style="color:var(--vm-ink-3);padding-bottom:3px">Tu</div><div style="color:var(--vm-ink-3);padding-bottom:3px">We</div><div style="color:var(--vm-ink-3);padding-bottom:3px">Th</div><div style="color:var(--vm-ink-3);padding-bottom:3px">Fr</div><div style="color:var(--vm-ink-3);padding-bottom:3px">Sa</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">4</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">5</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">6</div><div style="padding:5px 0;border-radius:5px;border:1px solid var(--vm-terracotta);color:var(--vm-ink)">7</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">8</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">9</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">10</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">11</div><div style="padding:5px 0;border-radius:5px;border:1px solid var(--vm-terracotta);color:var(--vm-ink)">12</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">13</div><div style="padding:5px 0;border-radius:5px;background:var(--vm-teal-deep);color:#F4F1E8">14</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">15</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">16</div><div style="padding:5px 0;border-radius:5px;color:var(--vm-ink-2)">17</div></div></div></body></html>
