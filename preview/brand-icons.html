<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:26px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase}
/* buttons */
.btn{font-family:var(--vm-serif);font-size:14px;border-radius:999px;padding:8px 18px;cursor:pointer;border:1px solid var(--vm-border);background:var(--vm-paper);color:var(--vm-ink)}
.btn--solid{background:var(--vm-teal-deep);color:#F4F1E8;border-color:var(--vm-teal-deep)}
.iconbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--vm-border);background:var(--vm-paper);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2);cursor:pointer}
.iconbtn.active{background:var(--vm-teal-deep);border-color:var(--vm-teal-deep);color:#F4F1E8}
.iconbtn--round{border-radius:999px}
.pill{font-family:var(--vm-mono);font-size:11px;padding:6px 13px;border:1px solid var(--vm-border);border-radius:999px;background:var(--vm-paper);color:var(--vm-ink-2);display:flex;align-items:center;gap:6px}
.pill b{color:var(--vm-ink);font-weight:700}
.pill--dash{border-style:dashed;color:var(--vm-ink-3)}
.search{display:flex;align-items:center;gap:9px;border:1px solid var(--vm-border);border-radius:999px;padding:9px 15px;background:var(--vm-paper);min-width:280px}
.search input{border:0;background:transparent;outline:0;font-family:var(--vm-serif);font-size:14px;color:var(--vm-ink);flex:1}
.kbd{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3);border:1px solid var(--vm-border-soft);border-radius:4px;padding:2px 6px;background:var(--vm-paper-warm)}
.badge{font-family:var(--vm-mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}

</style></head><body><span class="cap">Iconography · Tabler Icons (ti, 1.6px stroke)</span><div style="height:14px"></div>
<div class="row" style="gap:18px;font-size:22px;color:var(--vm-ink-2)"><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-eye"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">eye</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-target"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">target</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-affiliate"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">affiliate</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-binary-tree-2"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">binary-tree-2</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-search"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">search</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-adjustments-horizontal"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">adjustments-horizontal</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-calendar-event"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">calendar-event</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-lock"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">lock</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-currency-dollar"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">currency-dollar</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-external-link"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">external-link</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-arrow-right"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">arrow-right</span></div><div class="col" style="align-items:center;gap:6px;width:60px"><i class="ti ti-chevron-down"></i><span style="font-family:var(--vm-mono);font-size:8px;color:var(--vm-ink-3);text-align:center">chevron-down</span></div></div></body></html>
