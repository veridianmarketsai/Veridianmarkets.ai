<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--vm-paper-warm);font-family:var(--vm-serif);color:var(--vm-ink);padding:24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column}
.cap{font-family:var(--vm-mono);font-size:9px;letter-spacing:.05em;color:var(--vm-ink-3);text-transform:uppercase}
/* buttons */
.btn{font-family:var(--vm-serif);font-size:14px;border-radius:999px;padding:8px 18px;cursor:pointer;border:1px solid var(--vm-border);background:var(--vm-paper);color:var(--vm-ink)}
.btn--solid{background:var(--vm-teal-deep);color:#F4F1E8;border-color:var(--vm-teal-deep)}
.iconbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--vm-border);background:var(--vm-paper);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2);cursor:pointer}
.iconbtn.active{background:var(--vm-teal-deep);border-color:var(--vm-teal-deep);color:#F4F1E8}
.iconbtn--round{border-radius:999px}
.pill{font-family:var(--vm-mono);font-size:11px;padding:6px 13px;border:1px solid var(--vm-border);border-radius:999px;background:var(--vm-paper);color:var(--vm-ink-2);display:flex;align-items:center;gap:6px}
.pill b{color:var(--vm-ink);font-weight:700}
.pill--dash{border-style:dashed;color:var(--vm-ink-3)}
.search{display:flex;align-items:center;gap:9px;border:1px solid var(--vm-border);border-radius:999px;padding:9px 15px;background:var(--vm-paper);min-width:280px}
.search input{border:0;background:transparent;outline:0;font-family:var(--vm-serif);font-size:14px;color:var(--vm-ink);flex:1}
.kbd{font-family:var(--vm-mono);font-size:10px;color:var(--vm-ink-3);border:1px solid var(--vm-border-soft);border-radius:4px;padding:2px 6px;background:var(--vm-paper-warm)}
.badge{font-family:var(--vm-mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}

</style></head><body><span class="cap">Screener row</span><div style="height:12px"></div>
<div class="card" style="border-radius:10px;overflow:hidden">
  <div style="display:grid;grid-template-columns:88px 1fr 84px 70px 80px auto;align-items:center;gap:12px;padding:12px 16px;background:var(--vm-teal-tint)">
    <div><div style="font-family:var(--vm-serif);font-weight:700;font-size:22px">AAPL</div></div>
    <div><div style="font-family:var(--vm-mono);font-size:11px;color:var(--vm-ink-2)">Apple Inc.</div><div class="cap" style="margin-top:3px">Tech · Consumer · $4.54T</div></div>
    <div style="font-family:var(--vm-mono);font-weight:700;font-size:14px;text-align:right">$308.82</div>
    <div style="font-family:var(--vm-mono);font-weight:600;font-size:12px;text-align:right;color:var(--vm-up-ink)">+1.26%</div>
    <div><svg width="72" height="24" viewBox="0 0 72 26"><polyline points="0,22 10,18 20,20 30,12 40,14 50,7 60,9 70,3" fill="none" stroke="#1D9E75" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="row" style="gap:6px;flex-wrap:nowrap">
      <div style="width:28px;height:28px;border-radius:999px;background:var(--vm-teal-deep);color:#F4F1E8;display:flex;align-items:center;justify-content:center"><i class="ti ti-eye" style="font-size:13px"></i></div>
      <div style="width:28px;height:28px;border-radius:999px;border:1px solid var(--vm-border);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2)"><i class="ti ti-affiliate" style="font-size:13px"></i></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:88px 1fr 84px 70px 80px auto;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--vm-border-soft)">
    <div><div style="font-family:var(--vm-serif);font-weight:700;font-size:22px">TSLA</div></div>
    <div><div style="font-family:var(--vm-mono);font-size:11px;color:var(--vm-ink-2)">Tesla, Inc.</div><div class="cap" style="margin-top:3px">Auto · EVs · $580B</div></div>
    <div style="font-family:var(--vm-mono);font-weight:700;font-size:14px;text-align:right">$182.04</div>
    <div style="font-family:var(--vm-mono);font-weight:600;font-size:12px;text-align:right;color:var(--vm-down-ink)">-2.14%</div>
    <div><svg width="72" height="24" viewBox="0 0 72 26"><polyline points="0,4 10,8 20,6 30,13 40,11 50,17 60,15 70,21" fill="none" stroke="#C0563B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="row" style="gap:6px;flex-wrap:nowrap">
      <div style="width:28px;height:28px;border-radius:999px;border:1px solid var(--vm-border);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2)"><i class="ti ti-eye" style="font-size:13px"></i></div>
      <div style="width:28px;height:28px;border-radius:999px;border:1px solid var(--vm-border);display:flex;align-items:center;justify-content:center;color:var(--vm-ink-2)"><i class="ti ti-affiliate" style="font-size:13px"></i></div>
    </div>
  </div>
</div></body></html>
