  <!-- SPA deep-link restore: 404.html (GitHub Pages) encodes the real path into
       a ?/ query and bounces here; this rewrites the URL back before React mounts.
       See https://github.com/rafgraph/spa-github-pages -->
  <script>
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>
