  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }

    main::-webkit-scrollbar { width: 11px; }
    main::-webkit-scrollbar-thumb { background: rgba(31,29,26,0.18); border-radius: 6px; border: 3px solid var(--vm-paper-warm); }
    button { font-family: inherit; }
  </style>
</head>
