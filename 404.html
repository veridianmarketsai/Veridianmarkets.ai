<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Veridian Markets</title>
  <!-- GitHub Pages serves this for any unknown path (e.g. /sign-in on a hard
       refresh). It encodes the requested path into a ?/ query and redirects to
       the app root, where index.html restores the real URL before React mounts.
       pathSegmentsToKeep = 0 because the site is served from the domain root.
       See https://github.com/rafgraph/spa-github-pages -->
  <script>
    (function () {
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }());
  </script>
</head>
<body></body>
</html>
