<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veridian Markets — history-led finance</title>
  <meta name="description" content="Veridian Markets maps the hidden dependencies behind every company, commodity and market — then reads today against what history has already taught us.">
  <link rel="stylesheet" href="/colors_and_type.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; }
    body { background: var(--vm-paper-warm); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    ::selection { background: #CFE5DD; }
    button { font-family: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes ldFloatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes ldFloatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes ldFloatC { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes ldDash { to { stroke-dashoffset: -16; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Shared app modules (same set as the app, minus app.jsx so the SPA does NOT
       boot — Landing.jsx mounts itself). The dependency-map demo can drill into a
       full-screen dashboard, so its downstream components must be present too. -->
  <script type="text/babel" src="/ui_kits/web/data.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/admin_data.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/primitives.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/CompanyHead.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/chrome.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/FrontPage.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Screener.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/SupplyChain.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/ScnLiveDemo.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Analysis.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Dashboard.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/History.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Memoir.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Learn.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/SignIn.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/MyPortfolio.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/MyBusiness.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/AdminPanel.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/AccountSettings.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Calendar.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/News.jsx"></script>
  <script type="text/babel" src="/ui_kits/web/Tour.jsx"></script>

  <!-- Standalone preview: tell Landing.jsx to mount itself (in the app it doesn't). -->
  <script>window.__VM_LANDING_STANDALONE = true;</script>
  <!-- The marketing landing site (mounts <VMLanding/> into #root). -->
  <script type="text/babel" src="/ui_kits/web/Landing.jsx"></script>
</body>
</html>
